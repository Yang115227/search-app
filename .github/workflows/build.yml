name: Android 打包
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      # 官方一键配置安卓SDK+JDK，自动处理路径，不会出现sdkmanager找不到
      - name: 配置Android环境
        uses: android-actions/setup-android@v3
        with:
          api-level: 34
          build-tools: "34.0.0"

      - name: 安装Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      # 完整堆栈日志，方便排查代码报错
      - name: 编译Release包
        run: |
         # 清理缓存
          rm -rf ~/.gradle/caches ./.gradle app/build
         # 写入gradle配置，不用EOF，不会报语法红线
         echo "org.gradle.jvmargs=-Xmx4096m -Xms2048m" >> gradle.properties
         echo "org.gradle.daemon=false" >> gradle.properties
         echo "org.gradle.parallel=false" >> gradle.properties
         # 完整打包命令
            ./gradlew clean assembleRelease --stacktrace --info --no-daemon

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: 搜题APP-release
          path: app/build/outputs/apk/release/*.apk
