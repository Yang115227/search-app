name: APK打包
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - name: 安装全局Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      # 增加--stacktrace打印完整报错堆栈
      - name: 编译Release包
        run: gradle assembleRelease --stacktrace --info

      - name: 上传APK
        uses: actions/upload-artifact@v4
        with:
          name: 搜题APP安装包
          path: app/build/outputs/apk/release/*.apk
