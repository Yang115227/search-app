name: SmartSearch CI Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android_sdk
      JAVA_VERSION: 17

    steps:
      - name: 拉取项目源码
        uses: actions/checkout@v4

      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: 下载 Android CommandLineTools
        run: wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O commandlinetools.zip

      - name: 解压并配置SDK工具目录
        run: |
          unzip commandlinetools.zip
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          mv cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          ls $ANDROID_SDK_ROOT/cmdline-tools/latest/bin

      # 修复许可证报错：使用yes自动确认，移除EOF块
      - name: 接受SDK许可
        run: yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: 安装编译依赖SDK
        run: |
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: 执行Gradle打包
        run: ./gradlew assembleRelease

      - name: 上传APK产物
        uses: actions/upload-artifact@v4
        with:
          name: 离线搜题安装包
          path: app/build/outputs/apk/release/*.apk
