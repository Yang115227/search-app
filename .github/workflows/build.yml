# ============================================
# SmartSearch 云端构建工作流
# 触发条件: push/PR 到 main, 或手动触发
# 运行环境: ubuntu-latest (GitHub Actions)
# 构建产出: Debug APK + Release APK (arm64-v8a, armeabi-v7a)
# ============================================
name: SmartSearch CI

on:
  push:
    branches: [main, master, develop]
    paths-ignore:
      - "**.md"
      - ".gitignore"
      - "build.sh"
      - "build.bat"
      - "build_termux.sh"
  pull_request:
    branches: [main, master]
  workflow_dispatch: # 支持手动触发
    inputs:
      build_type:
        description: "构建类型"
        required: true
        default: "debug"
        type: choice
        options:
          - debug
          - release
          - both
      run_tests:
        description: "运行单元测试"
        required: false
        default: true
        type: boolean

# ── 并发控制: 同一分支同一时间只有一个构建在运行 ──
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── 全局环境变量 ──
env:
  JAVA_VERSION: "17"
  COMPILE_SDK: "34"
  BUILD_TOOLS: "34.0.0"

jobs:
  # ════════════════════════════════════════════
  # Job 1: 代码检查与单元测试
  # ════════════════════════════════════════════
  lint_and_test:
    name: "🔍 代码检查 + 单元测试"
    runs-on: ubuntu-latest
    # 如果只有 workflow_dispatch 且 run_tests=false，跳过此 job
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.run_tests == 'false') }}

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.COMPILE_SDK }}
          build-tools: ${{ env.BUILD_TOOLS }}

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/
            ~/.gradle/wrapper/
            .gradle/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 运行 lint 检查
        run: |
          chmod +x gradlew
          ./gradlew lintDebug --no-daemon --stacktrace
        continue-on-error: true # lint 警告不阻断构建

      - name: 运行单元测试
        run: |
          ./gradlew testDebugUnitTest --no-daemon --stacktrace

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/
            app/build/test-results/

  # ════════════════════════════════════════════
  # Job 2: 构建 Debug APK
  # ════════════════════════════════════════════
  build_debug:
    name: "📦 构建 Debug APK"
    runs-on: ubuntu-latest
    # 手动触发且指定 release 时跳过
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'release') }}

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.COMPILE_SDK }}
          build-tools: ${{ env.BUILD_TOOLS }}

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/
            ~/.gradle/wrapper/
            .gradle/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 创建 PaddleOCR 占位目录（避免编译报错）
        run: |
          mkdir -p app/src/main/assets/ocr
          mkdir -p app/libs
          # 创建空占位文件，防止编译因缺少 .aar 而失败
          # 实际使用需要替换为真实 PaddleOCR AAR 文件
          if [ ! -f app/libs/PaddleOCR-2.7.0.aar ]; then
            touch app/libs/PaddleOCR-2.7.0.aar
          fi

      - name: 构建 Debug APK
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace
        env:
          CI: "true"

      - name: 上传 Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: smartsearch-debug
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: 输出构建信息
        run: |
          echo "## ✅ Debug 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 包名 | \`com.smartsearch.app.debug\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ABI  | arm64-v8a, armeabi-v7a |" >> $GITHUB_STEP_SUMMARY
          echo "| APK  | \`app/build/outputs/apk/debug/app-debug.apk\` |" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(ls -lh app/build/outputs/apk/debug/*.apk 2>/dev/null | awk '{print $5}')
          echo "| 大小 | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY

  # ════════════════════════════════════════════
  # Job 3: 构建 Release APK（含签名）
  # ════════════════════════════════════════════
  build_release:
    name: "📦 构建 Release APK"
    runs-on: ubuntu-latest
    # 手动触发且指定 debug 时跳过
    if: ${{ !(github.event_name == 'workflow_dispatch' && github.event.inputs.build_type == 'debug') }}

    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: ${{ env.JAVA_VERSION }}

      - name: 配置 Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: ${{ env.COMPILE_SDK }}
          build-tools: ${{ env.BUILD_TOOLS }}

      - name: 缓存 Gradle 依赖
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches/
            ~/.gradle/wrapper/
            .gradle/
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/libs.versions.toml', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: 创建 PaddleOCR 占位目录
        run: |
          mkdir -p app/src/main/assets/ocr
          mkdir -p app/libs
          if [ ! -f app/libs/PaddleOCR-2.7.0.aar ]; then
            touch app/libs/PaddleOCR-2.7.0.aar
          fi

      # ── Release 签名配置 ──
      # 在 GitHub 仓库 Settings → Secrets and variables → Actions 中配置:
      #   KEYSTORE_BASE64  - 签名密钥库文件的 base64 编码
      #   KEYSTORE_PASSWORD - 密钥库密码
      #   KEY_ALIAS        - 密钥别名
      #   KEY_PASSWORD     - 密钥密码
      # 如果未配置，则使用 Debug 签名（APK 仍可安装但不可上架）
      - name: 配置 Release 签名
        run: |
          if [ -n "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > smartsearch.keystore
            printf "storeFile=smartsearch.keystore\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n" \
              "${{ secrets.KEYSTORE_PASSWORD }}" \
              "${{ secrets.KEY_ALIAS }}" \
              "${{ secrets.KEY_PASSWORD }}" > signing.properties
            echo "✅ 已配置 Release 签名"
          else
            echo "⚠️ 未找到签名密钥，将生成 Debug 密钥用于 Release APK"
            mkdir -p ~/.android
            keytool -genkey -v -keystore ~/.android/debug.keystore \
              -storepass android -alias androiddebugkey -keypass android \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -dname "CN=Android Debug,O=Android,C=US" 2>/dev/null
          fi

      - name: 构建 Release APK
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease --stacktrace
        env:
          CI: "true"

      - name: 上传 Release APK
        uses: actions/upload-artifact@v4
        with:
          name: smartsearch-release
          path: app/build/outputs/apk/release/*.apk
          if-no-files-found: error
          retention-days: 90

      - name: 输出构建信息
        run: |
          echo "## ✅ Release 构建完成" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| 项目 | 值 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| 包名 | \`com.smartsearch.app\` |" >> $GITHUB_STEP_SUMMARY
          echo "| ABI  | arm64-v8a, armeabi-v7a |" >> $GITHUB_STEP_SUMMARY
          echo "| APK  | \`app/build/outputs/apk/release/app-release.apk\` |" >> $GITHUB_STEP_SUMMARY
          APK_SIZE=$(ls -lh app/build/outputs/apk/release/*.apk 2>/dev/null | awk '{print $5}')
          echo "| 大小 | $APK_SIZE |" >> $GITHUB_STEP_SUMMARY
          if [ -z "${{ secrets.KEYSTORE_BASE64 }}" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "> ⚠️ 此 APK 使用 Debug 签名，不可用于商店上架。" >> $GITHUB_STEP_SUMMARY
            echo "> 如需正式签名，请在仓库 Secrets 中配置 \`KEYSTORE_BASE64\`、\`KEYSTORE_PASSWORD\`、\`KEY_ALIAS\`、\`KEY_PASSWORD\`" >> $GITHUB_STEP_SUMMARY
          fi

  # ════════════════════════════════════════════
  # Job 4: 构建摘要（汇总所有 job 结果）
  # ════════════════════════════════════════════
  summary:
    name: "📋 构建摘要"
    runs-on: ubuntu-latest
    needs: [lint_and_test, build_debug, build_release]
    if: always()

    steps:
      - name: 汇总构建状态
        run: |
          echo "# 🏗️ SmartSearch 云端构建报告" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------|" >> $GITHUB_STEP_SUMMARY
          echo "| 🔍 代码检查 + 测试 | ${{ needs.lint_and_test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Debug APK | ${{ needs.build_debug.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| 📦 Release APK | ${{ needs.build_release.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 下载 APK" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "在构建完成后，进入 Actions 页面 → 点击本次运行 → 在 **Artifacts** 区域下载：" >> $GITHUB_STEP_SUMMARY
          echo "- \`smartsearch-debug.zip\` - Debug APK" >> $GITHUB_STEP_SUMMARY
          echo "- \`smartsearch-release.zip\` - Release APK" >> $GITHUB_STEP_SUMMARY