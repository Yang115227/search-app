name: Android 打包
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk
    steps:
      - name: 拉取源码
        uses: actions/checkout@v4

      - name: 配置JDK17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: 安装Gradle 8.13
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.13"

      # 自动下载安卓SDK34与构建工具
      - name: 安装Android SDK
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools/latest
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O sdk.zip
          unzip -q sdk.zip -d $ANDROID_SDK_ROOT/cmdline-tools/latest
          export PATH=$PATH:$ANDROID_SDK_ROOT/cmdline-tools/latest/bin
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # 打印完整报错日志 --stacktrace 全堆栈、--info 详细过程
      - name: 编译Release安装包
        run: gradle assembleRelease --stacktrace --info
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      - name: 导出APK安装包
        uses: actions/upload-artifact@v4
        with:
          name: 搜题APP-release
          path: app/build/outputs/apk/release/*.apk
