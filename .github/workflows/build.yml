name: SmartSearch 自动打包
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      JAVA_VERSION: 17
      ANDROID_SDK_ROOT: ${{ github.workspace }}/android-sdk

    steps:
      # 1. 拉取完整源码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 安装JDK17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. 生成缺失的 gradlew 脚本（关键修复步骤）
      - name: Generate Gradle wrapper
        run: gradle wrapper --gradle-version 8.13

      # 4. 赋予执行权限
      - name: Grant execute permission
        run: chmod +x gradlew

      # 5. 下载Android SDK命令行工具
      - name: Download Android SDK Tools
        run: |
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmd.zip
          unzip cmd.zip -d $ANDROID_SDK_ROOT/cmdline-tools
          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest

      # 6. 同意SDK协议并安装编译组件
      - name: Install SDK components
        run: |
          yes | $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_SDK_ROOT/cmdline-tools/latest/bin/sdkmanager "platforms;android-34" "build-tools;34.0.0"

      # 7. 编译Release APK
      - name: Build Release APK
        run: ./gradlew assembleRelease
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}

      # 8. 上传安装包
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SmartSearch_Release_APK
          path: app/build/outputs/apk/release/*.apk
