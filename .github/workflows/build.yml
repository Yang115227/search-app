name: SmartSearch CI Build
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'both'
        type: choice
        options:
          - debug
          - release
          - both
env:
  GRADLE_VERSION: "8.4"
  ANDROID_COMPILE_SDK: "34"
  ANDROID_BUILD_TOOLS: "34.0.0"
  ANDROID_HOME: ${{ github.workspace }}/android-sdk
jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      # 1. 拉取代码
      - name: Checkout
        uses: actions/checkout@v4

      # 2. JDK17
      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # 3. Gradle阿里云镜像加速
      - name: Config Gradle Aliyun Mirror
        run: |
          echo "dependencyResolutionManagement {
              repositories {
                  maven { url 'https://maven.aliyun.com/repository/google' }
                  maven { url 'https://maven.aliyun.com/repository/public' }
                  maven { url 'https://maven.aliyun.com/repository/gradle-plugin' }
                  google()
                  mavenCentral()
              }
          }" > settings.gradle

      # ======================
      # 【核心替换】手动安装Android SDK，使用清华镜像，彻底避开setup-android插件报错
      # ======================
      - name: Install Android SDK Manually (清华镜像)
        run: |
          # 1. 创建SDK目录
          mkdir -p $ANDROID_HOME/cmdline-tools
          cd $ANDROID_HOME/cmdline-tools
          # 2. 国内镜像下载命令行工具（ghproxy加速谷歌下载地址）
          curl -L "https://mirror.ghproxy.com/https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip" -o cmd.zip
          unzip cmd.zip
          mv cmdline-tools latest
          rm cmd.zip
          # 3. 写入清华SDK镜像源，替换谷歌官方源
          echo "sdk.manager.site=https://mirrors.tuna.tsinghua.edu.cn/android/repository/" > $ANDROID_HOME/source.properties
          # 4. 添加环境变量
          echo "PATH=$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools:$PATH" >> $GITHUB_ENV
          # 5. 接受协议并安装所需SDK组件
          yes | sdkmanager --licenses
          sdkmanager "platforms;android-${{ env.ANDROID_COMPILE_SDK }}" "build-tools;${{ env.ANDROID_BUILD_TOOLS }}" "platform-tools"
          # 强制切换镜像下载源
          sdkmanager --no_https --sdk_root=$ANDROID_HOME

      # 5. Gradle Wrapper 国内镜像下载
      - name: Setup Gradle Wrapper
        run: |
          WRAPPER_JAR="gradle/wrapper/gradle-wrapper.jar"
          WRAPPER_URL="https://mirror.ghproxy.com/https://raw.githubusercontent.com/gradle/gradle/v${GRADLE_VERSION}.0/gradle/wrapper/gradle-wrapper.jar"
          if [ ! -f "$WRAPPER_JAR" ]; then
            echo "下载 gradle-wrapper.jar (v${GRADLE_VERSION})..."
            mkdir -p gradle/wrapper
            curl -sSL "$WRAPPER_URL" -o "$WRAPPER_JAR"
            echo "gradle-wrapper.jar 下载完成"
          else
            echo "gradle-wrapper.jar 已存在，跳过"
          fi
          chmod +x ./gradlew

      # 6. 生成本地签名密钥
      - name: Generate Keystore
        run: |
          keytool -genkey -v \
            -keystore smartsearch.keystore \
            -alias smartsearch \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=SmartSearch, OU=CI, O=SmartSearch, L=Beijing, ST=Beijing, C=CN"
          cat > signing.properties << 'EOF'
          storeFile=smartsearch.keystore
          storePassword=android
          keyAlias=smartsearch
          keyPassword=android
          EOF
          echo "签名配置完成"

      # 7. Gradle缓存加速
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ${{ env.ANDROID_HOME }}
          key: gradle-android-sdk-${{ runner.os }}-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            gradle-android-sdk-${{ runner.os }}-

      # 8. 编译Debug包
      - name: Build Debug APK
        if: ${{ github.event.inputs.build_type == 'debug' || github.event.inputs.build_type == 'both' || github.event.inputs.build_type == '' }}
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            --warning-mode all

      # 9. 编译Release包
      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'release' || github.event.inputs.build_type == 'both' }}
        run: |
          ./gradlew assembleRelease \
            --no-daemon \
            --stacktrace \
            --warning-mode all

      # 10. 上传产物
      - name: Upload Debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartsearch-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload Release APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartsearch-release-apk
          path: app/build/outputs/apk/release/app-release.apk
          if-no-files-found: warn
          retention-days: 30

      - name: Upload ProGuard Mapping
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smartsearch-mapping
          path: app/build/outputs/mapping/release/mapping.txt
          if-no-files-found: ignore
          retention-days: 90
